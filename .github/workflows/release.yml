# ─────────────────────────────────────────────────────────────────────────────
# Build and Release — builds OpenUI for macOS + Windows and publishes the
# installers AND the electron-updater feed metadata to a GitHub Release
# whenever a version tag (v*) is pushed.
#
#   git tag v0.1.0
#   git push origin v0.1.0
#
# AUTO-UPDATE NOTE: electron-updater discovers new versions by reading the
# channel files that electron-builder generates next to the installers:
#   • macOS  → latest-mac.yml
#   • Windows → latest.yml
# and applies differential (delta) Windows updates from the *.blockmap files.
# These MUST be uploaded to the Release alongside the .dmg/.exe — without them
# the app has no feed to poll and auto-update silently does nothing. The globs
# below upload all three (installer + .yml + .blockmap) for each platform.
#
# OPTIONAL GitHub Secrets (Settings → Secrets and variables → Actions):
#   These are only needed if you want the packaged build to ship with the
#   Stripe price IDs inlined into the renderer bundle. They are NOT secret
#   (public SKU-like values) but are kept in Actions secrets for convenience.
#   If unset, the v0.1.0 UI shell still builds fine — pricing buttons just
#   resolve to undefined price IDs at runtime.
#     VITE_STRIPE_PRO_PRICE_ID
#     VITE_STRIPE_ENTERPRISE_PRICE_ID
#
#   Do NOT add real Anthropic/OpenAI/Supabase service-role/Stripe SECRET keys
#   here — those are runtime-only and live in the user's local .env or the
#   Supabase Edge Function secrets, never in the shipped binary.
#
#   GITHUB_TOKEN is provided automatically by Actions — no setup required.
#
#   Optional PostHog telemetry (runtime — not baked into the binary):
#     POSTHOG_API_KEY    — PostHog project API key (phc_…)
#     POSTHOG_HOST       — PostHog ingest host (default: https://us.i.posthog.com)
#   If unset, telemetry is silently disabled in the shipped build.
# ─────────────────────────────────────────────────────────────────────────────
name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        if: matrix.os == 'macos-latest'
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable macOS code signing — no certificate is configured.
          # electron-builder will still find the system keychain on the runner
          # and try to sign unless we explicitly opt out here.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_STRIPE_PRO_PRICE_ID: ${{ secrets.VITE_STRIPE_PRO_PRICE_ID }}
          VITE_STRIPE_ENTERPRISE_PRICE_ID: ${{ secrets.VITE_STRIPE_ENTERPRISE_PRICE_ID }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}

      # hnswlib-node (RAG vector index) cannot be rebuilt against Electron's ABI
      # on the Windows runner (C2666 under the runner's MSVC), and there is no
      # newer release that fixes it. It is an optionalDependency, so remove it
      # before packaging — electron-builder then skips it and rag.ts degrades
      # gracefully (RAG ships on macOS only for now). Without this the whole
      # Windows installer build fails.
      - name: Drop hnswlib-node before packaging (Windows — RAG disabled)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: rm -rf node_modules/hnswlib-node

      # ── Azure Trusted Signing (Windows code signing) ─────────────────────────
      # Removes the "Windows protected your PC" SmartScreen warning.
      # FREE for open-source projects: https://aka.ms/trustedsigning
      #
      # Required GitHub Actions secrets (Settings → Secrets → Actions):
      #   AZURE_CLIENT_ID         — App Registration client ID
      #   AZURE_TENANT_ID         — Azure tenant ID
      #   AZURE_SUBSCRIPTION_ID   — Azure subscription ID
      #   AZURE_SIGNING_ACCOUNT   — Trusted Signing account name
      #   AZURE_CERT_PROFILE      — Certificate profile name
      #   AZURE_ENDPOINT          — e.g. https://eus.codesigning.azure.net
      #
      # Setup guide: https://learn.microsoft.com/en-us/azure/trusted-signing/
      # electron-builder reads SIGNTOOL_PATH + CSC_* env vars automatically.
      - name: Sign Windows EXE (Azure Trusted Signing)
        if: matrix.os == 'windows-latest' && env.AZURE_CLIENT_ID != ''
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE }}
          files-folder: dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Build Windows EXE
        if: matrix.os == 'windows-latest'
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_STRIPE_PRO_PRICE_ID: ${{ secrets.VITE_STRIPE_PRO_PRICE_ID }}
          VITE_STRIPE_ENTERPRISE_PRICE_ID: ${{ secrets.VITE_STRIPE_ENTERPRISE_PRICE_ID }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}

      # Upload the installer, the electron-updater channel file (latest-mac.yml)
      # and the differential-update blockmaps so the publish job can attach them.
      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn

      # Upload the installer, the channel file (latest.yml) and the *.exe
      # blockmaps that drive Windows delta updates.
      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
          if-no-files-found: warn

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: ./artifacts/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./artifacts/win

      # Attach EVERY file (installers + .yml feeds + .blockmap deltas) to the
      # Release. The .yml files are what electron-updater polls; omitting them
      # breaks auto-update entirely.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/mac/*.dmg
            ./artifacts/mac/*.yml
            ./artifacts/mac/*.blockmap
            ./artifacts/win/*.exe
            ./artifacts/win/*.yml
            ./artifacts/win/*.blockmap
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          body: |
            ## Install

            | Platform | Download |
            |---|---|
            | Windows | `OpenUI.Setup.exe` |
            | macOS Apple Silicon | `OpenUI-arm64.dmg` |
            | macOS Intel | `OpenUI-x64.dmg` |

            > **Windows users:** If you see "Windows protected your PC", click **More info → Run anyway**.
            > This is a SmartScreen reputation warning for new apps — not a virus alert.
            > [Full install guide →](https://github.com/Satyabrat2005/Openui/blob/main/WINDOWS_INSTALL.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
